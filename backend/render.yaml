services:
  - type: web
    name: despacha-api
    env: python
    buildCommand: cd webapp && npm ci && npm run build && cd ../backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: despacha-db
          property: connectionString
      - key: APP_PUBLIC_URL
        value: https://despacha.onrender.com
      - key: DEBUG
        value: "false"
      - key: CAKTO_CLIENT_ID
        sync: false
      - key: CAKTO_CLIENT_SECRET
        sync: false
      - key: CAKTO_WEBHOOK_SECRET
        sync: false
      - key: CAKTO_API_BASE_URL
        value: https://api.cakto.com.br

databases:
  - name: despacha-db
    databaseName: despacha
    plan: free
